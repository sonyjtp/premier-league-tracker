name: Deploy to Scaleway

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Backend Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: cd backend && pytest tests --cov=app --cov-fail-under=85 --cov-report=term-missing

  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm run test:coverage

  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build, Push & Deploy
    needs: [test-backend, test-frontend]
    permissions:
      contents: write  # needed to create GitHub releases

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.nl-ams.scw.cloud
          username: ${{ secrets.SCW_ACCESS_KEY }}
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            rg.nl-ams.scw.cloud/premierleague/pl-backend:${{ github.ref_name }}
            rg.nl-ams.scw.cloud/premierleague/pl-backend:latest
          cache-from: type=registry,ref=rg.nl-ams.scw.cloud/premierleague/pl-backend:cache
          cache-to: type=registry,ref=rg.nl-ams.scw.cloud/premierleague/pl-backend:cache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            rg.nl-ams.scw.cloud/premierleague/pl-frontend:${{ github.ref_name }}
            rg.nl-ams.scw.cloud/premierleague/pl-frontend:latest
          cache-from: type=registry,ref=rg.nl-ams.scw.cloud/premierleague/pl-frontend:cache
          cache-to: type=registry,ref=rg.nl-ams.scw.cloud/premierleague/pl-frontend:cache,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl rollout restart deployment/backend deployment/frontend -n premierleague
          kubectl rollout status deployment/backend -n premierleague --timeout=120s
          kubectl rollout status deployment/frontend -n premierleague --timeout=120s

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
